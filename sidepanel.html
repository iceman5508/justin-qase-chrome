<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; background-color: #1e1e1e; color: #cccccc; margin: 0; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
    h2.title { margin-top: 0; font-size: 18px; color: #fff; }
    
    .tools { display: flex; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
    .tool-btn { background-color: #2d2d2d; border: 1px solid #444; color: #ccc; padding: 8px 12px; border-radius: 4px; cursor: pointer; flex: 1; font-size: 12px; transition: 0.2s; }
    .tool-btn.active { background-color: #0e639c; color: white; border-color: #0e639c; font-weight: bold; }

    #scrapeBtn { display: flex; align-items: center; justify-content: center; gap: 6px; background-color: #2d2d2d; color: #4CAF50; border: 1px solid #4CAF50; padding: 6px; width: 100%; margin-bottom: 8px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: 0.2s; flex-shrink: 0; }
    #scrapeBtn:hover { background-color: #4CAF50; color: #1e1e1e; font-weight: bold; }
    
    textarea { width: 100%; height: 80px; background: #2d2d2d; color: white; border: 1px solid #444; border-radius: 4px; padding: 8px; margin-bottom: 8px; resize: vertical; font-family: inherit; box-sizing: border-box; flex-shrink: 0; }
    
    #sendBtn { background-color: #0e639c; color: white; border: none; padding: 10px 16px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 14px; font-weight: bold; transition: 0.2s; flex-shrink: 0; }
    #sendBtn:disabled { background-color: #555; cursor: not-allowed; }
    
    .response-header { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; margin-bottom: 8px; flex-shrink: 0; }
    .response-title { font-size: 12px; font-weight: bold; color: #aaa; text-transform: uppercase; }
    #clearBtn { background: none; border: none; color: #f44336; cursor: pointer; font-size: 12px; padding: 0; transition: 0.2s; }
    #clearBtn:hover { color: #ff7961; text-decoration: underline; }

    #responseBox { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-bottom: 16px; }

    .chat-msg { padding: 10px 14px; border-radius: 6px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
    .msg-user { background-color: #0e639c; color: white; align-self: flex-end; border-bottom-right-radius: 2px; max-width: 85%; }
    .msg-assistant { background-color: #252526; border: 1px solid #444; color: #d4d4d4; align-self: flex-start; border-bottom-left-radius: 2px; width: 100%; box-sizing: border-box; }

    .bubble-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px solid #444; padding-bottom: 6px; }
    .bubble-name { font-size: 10px; font-weight: bold; color: #4EC9B0; text-transform: uppercase; letter-spacing: 0.5px; }
    .copy-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 11px; font-weight: bold; padding: 0; transition: 0.2s; display: flex; align-items: center; gap: 4px; }
    .copy-btn:hover { color: #fff; }

    #responseBox::-webkit-scrollbar { width: 8px; }
    #responseBox::-webkit-scrollbar-track { background: #1e1e1e; border-radius: 4px; }
    #responseBox::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    #responseBox::-webkit-scrollbar-thumb:hover { background: #777; }

    strong { color: #569cd6; font-weight: 600; }
    .msg-user strong { color: #fff; } 
    #responseBox h1, #responseBox h2, #responseBox h3 { color: #fff; margin-top: 16px; margin-bottom: 8px; font-weight: 600; }
    #responseBox h1 { font-size: 18px; border-bottom: 1px solid #444; padding-bottom: 4px; }
    #responseBox h2 { font-size: 16px; }
    #responseBox h3 { font-size: 14px; color: #4EC9B0; }
    #responseBox li { margin-left: 20px; margin-bottom: 4px; display: list-item; list-style-type: disc; }
    
    .inline-code { background-color: #1e1e1e; padding: 2px 4px; border-radius: 3px; font-family: 'Courier New', Courier, monospace; color: #ce9178; border: 1px solid #333; }
    .code-block { background-color: #1e1e1e; border: 1px solid #333; border-radius: 4px; margin: 10px 0; overflow: hidden; }
    .code-header { display: flex; justify-content: space-between; align-items: center; background-color: #333; color: #aaa; padding: 4px 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    
    .insert-btn { background-color: #0e639c; color: white; border: none; border-radius: 3px; padding: 4px 8px; font-size: 10px; cursor: pointer; text-transform: none; transition: 0.2s; }
    .insert-btn:hover { background-color: #1177bb; }
    .apply-file-btn { background-color: #D32F2F; color: white; border: none; border-radius: 3px; padding: 4px 8px; font-size: 10px; cursor: pointer; text-transform: none; transition: 0.2s; font-weight: bold;}
    .apply-file-btn:hover { background-color: #f44336; }

    /* --- NEW: TERMINAL STYLING --- */
    .terminal-block { background-color: #1e1e1e; border: 1px solid #444; border-radius: 4px; margin: 10px 0; padding: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .terminal-cmd { font-family: 'Courier New', Courier, monospace; color: #ce9178; font-size: 12px; word-break: break-all; }
    .terminal-btn { background-color: #795e26; color: white; border: none; border-radius: 3px; padding: 6px 10px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; font-weight: bold; transition: 0.2s; white-space: nowrap; flex-shrink: 0;}
    .terminal-btn:hover { background-color: #9e7a32; }

    .code-block pre { margin: 0; padding: 10px; overflow-x: auto; white-space: pre; }
    .code-block code { font-family: 'Courier New', Courier, monospace; color: #9cdcfe; }
  </style>
</head>
<body>
  <h2 class="title">Ask Justin-Qase</h2>
  <div class="tools">
    <button class="tool-btn active" data-cmd="/ask">Ask</button>
    <button class="tool-btn" data-cmd="/review">Review</button>
    <button class="tool-btn" data-cmd="/debug">Debug</button>
    <button class="tool-btn" data-cmd="/story">Story</button>
  </div>
  
  <button id="scrapeBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <line x1="16" y1="13" x2="8" y2="13"></line>
      <line x1="16" y1="17" x2="8" y2="17"></line>
      <polyline points="10 9 9 9 8 9"></polyline>
    </svg>
    Auto-Read Current Tab
  </button>
  
  <textarea id="taskInput" placeholder="Ask Justin a general question or paste context here..."></textarea>
  <button id="sendBtn">Submit</button>

  <div class="response-header" id="responseHeader" style="display: none;">
    <span class="response-title">Conversation</span>
    <button id="clearBtn">Clear Chat</button>
  </div>
  
  <div id="responseBox"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
