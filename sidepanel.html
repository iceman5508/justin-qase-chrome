<!DOCTYPE html>
<html data-theme="dark">
<head>
  <style>
    /* ... [Keep the exact same CSS variables and styles from the previous step] ... */
    :root {
      --bg-main: #f9fafb; --bg-panel: #ffffff; --bg-input: #ffffff; --text-main: #111827; --text-muted: #6b7280; --border-color: #e5e7eb;
      --accent-blue: #0ea5e9; --accent-blue-hover: #0284c7; --accent-green: #10b981; --accent-green-hover: #059669; --accent-red: #ef4444; --accent-red-hover: #dc2626;
      --chat-ai-bg: #f3f4f6; --chat-user-bg: #0ea5e9; --chat-user-text: #ffffff; --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05); --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    [data-theme="dark"] {
      --bg-main: #1e1e1e; --bg-panel: #252526; --bg-input: #2d2d2d; --text-main: #cccccc; --text-muted: #aaaaaa; --border-color: #444444;
      --accent-blue: #0e639c; --accent-blue-hover: #1177bb; --chat-ai-bg: #252526; --chat-user-bg: #0e639c; --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.5); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
    }

    body { font-family: system-ui, -apple-system, sans-serif; padding: 16px; background-color: var(--bg-main); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
    
    /* --- NEW: APP HEADER WITH HEARTBEAT --- */
    .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    h2.title { margin: 0; font-size: 18px; color: var(--text-main); font-weight: 700; }
    .status-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 4px 8px; background: var(--bg-input); border-radius: 12px; border: 1px solid var(--border-color); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--accent-red); transition: background-color 0.3s; }
    .status-indicator.online .status-dot { background-color: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
    .status-indicator.online .status-text { color: var(--accent-green); }

    .tools { display: flex; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
    .tool-btn { background-color: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 12px; border-radius: 6px; cursor: pointer; flex: 1; font-size: 12px; font-weight: 500; transition: all 0.2s; box-shadow: var(--shadow-sm); }
    .tool-btn:hover { border-color: var(--accent-blue); color: var(--text-main); }
    .tool-btn.active { background-color: var(--accent-blue); color: white; border-color: var(--accent-blue); font-weight: bold; }

    .action-row { display: flex; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
    .action-btn { display: flex; align-items: center; justify-content: center; gap: 6px; background-color: var(--bg-input); border: 1px solid var(--border-color); padding: 8px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; box-shadow: var(--shadow-sm); }
    #scrapeBtn { color: var(--accent-green); border-color: var(--accent-green); }
    #scrapeBtn:hover { background-color: var(--accent-green); color: white; transform: translateY(-1px); }
    #inspectBtn { color: var(--accent-blue); border-color: var(--accent-blue); }
    #inspectBtn:hover { background-color: var(--accent-blue); color: white; transform: translateY(-1px); }
    
    textarea { width: 100%; height: 80px; background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; margin-bottom: 8px; resize: none; font-family: inherit; box-sizing: border-box; flex-shrink: 0; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); transition: border 0.2s; }
    textarea:focus { outline: none; border-color: var(--accent-blue); }
    
    #sendBtn { background-color: var(--accent-blue); color: white; border: none; padding: 12px 16px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 14px; font-weight: bold; transition: all 0.2s; flex-shrink: 0; box-shadow: var(--shadow-sm); }
    #sendBtn:hover:not(:disabled) { background-color: var(--accent-blue-hover); transform: translateY(-1px); }
    #sendBtn:disabled { background-color: var(--text-muted); cursor: not-allowed; opacity: 0.7; }
    
    .response-header { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; margin-bottom: 8px; flex-shrink: 0; }
    .response-title { font-size: 12px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    #clearBtn { background: none; border: none; color: var(--accent-red); cursor: pointer; font-size: 12px; padding: 0; font-weight: 600; transition: 0.2s; }
    #clearBtn:hover { color: var(--accent-red-hover); text-decoration: underline; }

    #responseBox { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding: 10px 4px 16px 4px; }
    #responseBox::-webkit-scrollbar { width: 6px; }
    #responseBox::-webkit-scrollbar-track { background: transparent; }
    #responseBox::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    #responseBox::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    .chat-msg { padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; box-shadow: var(--shadow-sm); }
    .msg-user { background-color: var(--chat-user-bg); color: var(--chat-user-text); align-self: flex-end; border-bottom-right-radius: 4px; max-width: 85%; }
    .msg-assistant { background-color: var(--chat-ai-bg); border: 1px solid var(--border-color); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 4px; width: 100%; box-sizing: border-box; }

    .bubble-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
    .bubble-name { font-size: 11px; font-weight: bold; color: var(--accent-blue); text-transform: uppercase; letter-spacing: 0.5px; }
    .copy-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 11px; font-weight: bold; padding: 0; transition: 0.2s; display: flex; align-items: center; gap: 4px; }
    .copy-btn:hover { color: var(--text-main); }

    strong { color: var(--accent-blue); font-weight: 600; }
    .msg-user strong { color: #fff; } 
    #responseBox h1, #responseBox h2, #responseBox h3 { color: var(--text-main); margin-top: 16px; margin-bottom: 8px; font-weight: 600; }
    #responseBox h1 { font-size: 18px; border-bottom: 1px solid var(--border-color); padding-bottom: 4px; }
    #responseBox h2 { font-size: 16px; }
    #responseBox h3 { font-size: 14px; color: var(--accent-blue); }
    #responseBox li { margin-left: 20px; margin-bottom: 4px; display: list-item; list-style-type: disc; }
    
    .inline-code { background-color: rgba(0,0,0,0.1); padding: 2px 4px; border-radius: 4px; font-family: 'Courier New', Courier, monospace; color: var(--accent-red); font-weight: bold; }
    [data-theme="dark"] .inline-code { background-color: #1e1e1e; border: 1px solid #333; color: #ce9178; font-weight: normal; }
    
    .code-block { background-color: #1e1e1e; border: 1px solid #333; border-radius: 8px; margin: 12px 0; overflow: hidden; box-shadow: var(--shadow-md); }
    .code-header { display: flex; justify-content: space-between; align-items: center; background-color: #2d2d2d; color: #aaa; padding: 6px 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    .code-block pre { margin: 0; padding: 12px; overflow-x: auto; white-space: pre; }
    .code-block code { font-family: 'Courier New', Courier, monospace; color: #9cdcfe; font-size: 13px; }
    
    .insert-btn, .terminal-btn { background-color: #0e639c; color: white; border: none; border-radius: 4px; padding: 5px 10px; font-size: 11px; cursor: pointer; text-transform: none; transition: 0.2s; font-weight: bold; display: flex; align-items: center; gap: 4px; }
    .insert-btn:hover, .terminal-btn:hover { background-color: #1177bb; transform: scale(1.02); }
    .apply-file-btn { background-color: #dc2626; color: white; border: none; border-radius: 4px; padding: 5px 10px; font-size: 11px; cursor: pointer; text-transform: none; transition: 0.2s; font-weight: bold; display: flex; align-items: center; }
    .apply-file-btn:hover { background-color: #ef4444; transform: scale(1.02); }

    .terminal-block { background-color: #1e1e1e; border: 1px solid #333; border-radius: 8px; margin: 12px 0; padding: 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px; box-shadow: var(--shadow-md); }
    .terminal-cmd { font-family: 'Courier New', Courier, monospace; color: #ce9178; font-size: 13px; word-break: break-all; }
  </style>
</head>
<body>
  
  <div class="app-header">
    <h2 class="title">Justin-Qase</h2>
    <div id="connectionStatus" class="status-indicator">
      <div class="status-dot"></div>
      <span class="status-text">Offline</span>
    </div>
  </div>

  <div class="tools">
    <button class="tool-btn active" data-cmd="/ask">Ask</button>
    <button class="tool-btn" data-cmd="/review">Review</button>
    <button class="tool-btn" data-cmd="/debug">Debug</button>
    <button class="tool-btn" data-cmd="/story">Story</button>
  </div>
  
  <div class="action-row">
      <button id="scrapeBtn" class="action-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        Auto-Read Tab
      </button>
      <button id="inspectBtn" class="action-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
        Pick Element
      </button>
  </div>
  
  <textarea id="taskInput" placeholder="Ask Justin a general question or paste context here..."></textarea>
  <button id="sendBtn" disabled>Connecting...</button>

  <div class="response-header" id="responseHeader" style="display: none;">
    <span class="response-title">Conversation</span>
    <button id="clearBtn">Clear Chat</button>
  </div>
  
  <div id="responseBox"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
